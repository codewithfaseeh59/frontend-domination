<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms and Input Tags in HTML</title>
    <style>
     
    </style>
</head>

<body>
    <form id="form-wrapper">

        <!-- Type Attribute -->
        <input type="text">
        <input type="email">
        <input type="password">
        <input type="radio">
        <input type="range">
        <input type="number">
        <input type="date">
        <input type="checkbox">
        <input type="file">

        <!-- Name Attribute -->
        <input type="text" name="Ali">
        <!-- Value Attribute -->
        <input type="text" value="Enter your name">
        <!-- Placeholder Attribute -->
        <input type="email" placeholder="Enter your email address">
        <!-- Required Attribute -->
        <input type="password" required>
        <!-- Disabled Attribute -->
        <input type="text" disabled>


        <!-- Labels -->
        <label for="username">Username:
            <input type="text">
        </label>
        <label for="password">Password:
            <input type="password">
        </label>


    </form>

    <textarea placeholder="Tell us about yourself...">

    </textarea>

    <label>Choose a Car:</label>
    <select>
        <option>BMW</option>
        <option>Lexus</option>
        <option>Toyota</option>
        <option>Mercedes</option>
    </select>

    <fieldset>
        <legend>Enter your PC Specs</legend>
        <label for=""></label>
        <input type="text">
    </fieldset>

    <button type="submit">Submit</button>
</body>

</html>
