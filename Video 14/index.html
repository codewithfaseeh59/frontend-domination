<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro To CSS</title>
    <style>
    .container{
        color: red;
        background-color: yellow;
        font-size: 32px;
        font-weight: 700;
        font-family: "poppins";
        font-style: italic;
    }

    .box{
        width: 30vw;
    }
       
    </style>
</head>

<body>
    <!-- CSS => Cascade Styling Sheet -->
    <!-- CSS is used to design web pages -->
    <!-- HTML => Basic Structure of a web page -->
    <!-- CSS => Used to design the page like colors, fonts, animations, transitions etc -->
    <!-- JS => Used to write logics to make websites alive -->

    <!-- We can use CSS in three different ways -->
     <!-- 1) Inline CSS
      2) Internal CSS
      3) External CSS -->

      <div class="container box">
        Hey I'm a developer.
      </div>

     
    <span class="container" id="arham">Hey Arham is also a web developer.</span>


</body>

</html>
