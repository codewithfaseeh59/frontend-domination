<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f0f0f;
    }

    .card {
      width: 320px;
      padding: 30px;
      border: 2px solid #ff6b35;
      border-radius: 12px;
      margin: 20px;
      background: #1a1a1a;
      color: #fff;
    }

    .card h2 {
      margin-bottom: 12px;
    }

    .card p {
      margin-bottom: 20px;
      opacity: 0.7;
    }

    .card button {
      padding: 10px 24px;
      border: 2px solid #ff6b35;
      border-radius: 6px;
      background: transparent;
      color: #ff6b35;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Box Model Card</h2>
    <p>This card uses padding, border, margin, and box-sizing: border-box.</p>
    <button>Learn More</button>
  </div>
</body>
</html>
