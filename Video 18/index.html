<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model in CSS</title>
    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}




        .box-model {
            background-color: blueviolet;
            border: 2px solid red;
            border-radius:5px 20px 50px 10px;
          padding: 20px;
          margin: 30px;
          padding-top: 20px;
          padding-bottom: 30px;
          
        }

        .box-1 {
            border: 2px solid goldenrod;

        }
        .btn{
            background-color: crimson;
            border: none;
            font-size: 5vw;
            padding: 120px;
            margin: 230px;
            outline: none;
        }
    </style>
</head>

<body>
    <div class="box-model">
        <div class="box-1">
            <h1>Hello World</h1>
        </div>
        <div class="box-2">
            <p>Hello Developers</p>
        </div>
        <div class="box-3">
            <span>Hey Buddy</span>
        </div>

        <button class="btn">Submit</button>
    </div>

   
</body>

</html>
